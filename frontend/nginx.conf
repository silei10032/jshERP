server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # 文件上传：与后端 spring.servlet.multipart.max-file-size (10MB) 一致
    client_max_body_size 20m;

    # index.html 永不缓存，确保每次都加载最新的资源文件引用
    location = /index.html {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Vue CLI 构建产物：/js/、/css/、/img/、/fonts/ 下都是带 hash 的静态资源，永久缓存
    location ~* ^/(js|css|img|fonts|static)/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # 前端 SPA（vue-router history 模式 fallback）
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理（app 是 docker-compose 服务名；保留 context-path /mogoo-erp 不剥离）
    location /mogoo-erp/ {
        proxy_pass         http://app:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        # ERP 报表导出可能慢，给宽点
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
    }
}
